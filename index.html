<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הקומיקס שלי</title>
    <style>
        :root { --primary: #ffce00; --dark: #222; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border: 4px solid var(--dark); box-shadow: 10px 10px 0px var(--dark); }
        h1 { text-align: center; text-transform: uppercase; border-bottom: 4px solid var(--dark); padding-bottom: 10px; }
        
        /* דמויות */
        .section { margin-bottom: 30px; padding: 15px; border: 2px solid #ddd; }
        .char-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .char-card { width: 80px; text-align: center; font-size: 12px; }
        .char-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        /* לוח הקומיקס */
        .comic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .panel { border: 3px solid var(--dark); aspect-ratio: 1/1; position: relative; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .panel img { width: 100%; height: 100%; object-fit: cover; }
        .speech-bubble { position: absolute; top: 10px; right: 10px; background: white; border: 2px solid black; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; max-width: 70%; }

        /* טפסים */
        .controls { display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        button { background: var(--primary); border: 2px solid var(--dark); padding: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: white; transform: translate(-2px, -2px); box-shadow: 2px 2px 0 var(--dark); }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 יוצר הקומיקס שלכם</h1>

    <div class="section">
        <h3>1. הגדרת דמויות</h3>
        <div class="controls">
            <input type="text" id="charName" placeholder="שם הדמות (למשל: הגיבור)">
            <input type="file" id="charImage" accept="image/*">
            <button onclick="addCharacter()">הוסף דמות לסיפור</button>
        </div>
        <div class="char-list" id="charList"></div>
    </div>

    <div class="section">
        <h3>2. צור משבצת קומיקס חדשה</h3>
        <div class="controls">
            <select id="charSelect"><option value="">בחר דמות שמשתתפת...</option></select>
            <textarea id="actionText" placeholder="מה קורה בסצנה? (למשל: הדמות קופצת מעל בניין)"></textarea>
            <input type="text" id="dialogueText" placeholder="מה הדמות אומרת?">
            <button onclick="generatePanel()">חולל תמונת קומיקס (סימולציה)</button>
        </div>
    </div>

    <div class="comic-grid" id="comicGrid">
        </div>
</div>

<script>
    let characters = [];

    // פונקציה להוספת דמות
    function addCharacter() {
        const name = document.getElementById('charName').value;
        const fileInput = document.getElementById('charImage');
        
        if (!name || !fileInput.files[0]) return alert("נא להזין שם ולהעלות תמונה");

        const reader = new FileReader();
        reader.onload = function(e) {
            const char = { id: Date.now(), name: name, img: e.target.result };
            characters.push(char);
            renderCharacters();
            updateSelect();
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    function renderCharacters() {
        const list = document.getElementById('charList');
        list.innerHTML = characters.map(c => `
            <div class="char-card">
                <img src="${c.img}">
                <div>${c.name}</div>
            </div>
        `).join('');
    }

    function updateSelect() {
        const select = document.getElementById('charSelect');
        select.innerHTML = '<option value="">בחר דמות...</option>' + 
            characters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    // פונקציה ליצירת פאנל (בשלב זה - סימולציה)
    function generatePanel() {
        const charId = document.getElementById('charSelect').value;
        const action = document.getElementById('actionText').value;
        const dialogue = document.getElementById('dialogueText').value;
        const grid = document.getElementById('comicGrid');

        if (!charId || !action) return alert("בחר דמות ותאר פעולה");

        const char = characters.find(c => c.id == charId);

        // יצירת אלמנט הפאנל
        const panel = document.createElement('div');
        panel.className = 'panel';
        
        // כאן בעתיד תהיה קריאת ה-API ל-AI. כרגע נשתמש בתמונת הדמות כדוגמה.
        panel.innerHTML = `
            <img src="${char.img}" style="filter: contrast(1.2) grayscale(0.5) sepia(0.2);">
            ${dialogue ? `<div class="speech-bubble">${dialogue}</div>` : ''}
            <div style="position:absolute; bottom:0; background:rgba(0,0,0,0.7); color:white; width:100%; font-size:12px; padding:5px;">
                ${action}
            </div>
        `;

        grid.appendChild(panel);
    }
</script>

</body>
</html>
